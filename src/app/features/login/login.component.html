<div class="login-page">
  <button
    type="button"
    mat-icon-button
    class="theme-toggle"
    (click)="themeService.toggle()"
    [matTooltip]="themeService.theme() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
    [attr.aria-label]="themeService.theme() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
  >
    <mat-icon>{{ themeService.theme() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>

  <form class="login-card" (ngSubmit)="submit()">
    <span class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="7" height="7" rx="2" fill="currentColor" opacity="0.9" />
        <rect x="14" y="3" width="7" height="7" rx="2" fill="currentColor" opacity="0.55" />
        <rect x="3" y="14" width="7" height="7" rx="2" fill="currentColor" opacity="0.55" />
        <rect x="14" y="14" width="7" height="7" rx="2" fill="currentColor" opacity="0.9" />
      </svg>
    </span>
    <h1>Registree</h1>
    <p class="subtitle">Sign in to your Docker registry</p>

    @if (error()) {
      <app-banner type="error" [message]="error()!" />
    }

    <label>
      Username
      <input type="text" name="username" [(ngModel)]="username" autocomplete="username" required />
    </label>

    <label>
      Password
      <input type="password" name="password" [(ngModel)]="password" autocomplete="current-password" required />
    </label>

    <button type="submit" class="btn btn-primary" [disabled]="submitting()">
      {{ submitting() ? 'Connecting…' : 'Sign in' }}
    </button>
  </form>
</div>
